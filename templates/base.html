<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Flask App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }
        .container {
            max-width: 800px;
        }
        .card {
            border-radius: 15px;
        }
        .navbar {
            border-radius: 0 0 15px 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">FlaskApp</a>

    <div class="ms-auto">
        <a class="btn btn-outline-light me-2" href="{{ url_for('index') }}">Главная</a> <!--Кнопки меню-->
        <a class="btn btn-outline-light me-2" href="{{ url_for('counter') }}">Счётчик</a>
<!--Условие авторизации-->
        {% if current_user.is_authenticated %}
            <a class="btn btn-warning me-2" href="{{ url_for('secret') }}">Секретная</a>
            <a class="btn btn-danger" href="{{ url_for('logout') }}">Выйти</a>
        {% else %}
            <a class="btn btn-success" href="{{ url_for('login') }}">Войти</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-5">

    <!-- Flash сообщения -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
